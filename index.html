<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Barlow',system-ui,sans-serif;min-height:100vh;display:grid;place-items:center;background:linear-gradient(135deg,#222,#2F2F2F 55%,#1a1a1a);color:#fff;padding:24px}
  .lock{width:100%;max-width:380px;text-align:center}
  .mark{width:60px;height:60px;border-radius:12px;background:#EB1A2C;display:grid;place-items:center;font-family:'Barlow Condensed';font-weight:900;font-size:2.2rem;margin:0 auto 22px}
  h1{font-family:'Barlow Condensed';text-transform:uppercase;letter-spacing:.04em;font-weight:800;font-size:1.6rem;margin-bottom:6px}
  p.sub{color:#a1a1aa;font-size:.95rem;margin-bottom:24px}
  form{display:flex;flex-direction:column;gap:12px}
  input{font-family:'Barlow';font-size:1.05rem;padding:14px 16px;border-radius:10px;border:1px solid #3f3f46;background:#18181b;color:#fff;text-align:center}
  input:focus{outline:none;border-color:#EB1A2C}
  button{font-family:'Barlow Condensed';text-transform:uppercase;letter-spacing:.04em;font-weight:800;font-size:1.15rem;padding:14px;border-radius:10px;border:0;background:#EB1A2C;color:#fff;cursor:pointer;transition:background .15s,transform .15s}
  button:hover{background:#c5121f;transform:translateY(-1px)}
  button:disabled{opacity:.6;cursor:default;transform:none}
  .err{color:#fca5a5;font-size:.9rem;min-height:1.2em}
  .foot{margin-top:22px;color:#71717a;font-size:.8rem;letter-spacing:.02em}
</style>
</head>
<body>
  <div class="lock">
    <div class="mark">H</div>
    <h1>Hamstra Roofing</h1>
    <p class="sub">Protected planning area. Enter the passphrase to continue.</p>
    <form id="f" autocomplete="off">
      <input id="p" type="password" placeholder="Passphrase" autofocus aria-label="Passphrase">
      <button id="b" type="submit">Unlock</button>
      <div class="err" id="e"></div>
    </form>
    <div class="foot">Hamstra Roofing × Orbis Design</div>
  </div>
